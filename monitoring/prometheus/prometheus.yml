global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "127.0.0.1:9093"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "127.0.0.1:9090"

  - job_name: "alertmanager"
    static_configs:
      - targets:
          - "127.0.0.1:9093"

  - job_name: "grafana"
    static_configs:
      - targets:
          - "127.0.0.1:3000"

  - job_name: "node_exporter"
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/nodes.yml
        refresh_interval: 30s

  - job_name: "cadvisor"
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/cadvisor.yml
        refresh_interval: 30s

  - job_name: "blackbox_exporter"
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/blackbox-exporters.yml
        refresh_interval: 30s

  - job_name: "blackbox_http"
    scrape_interval: 45s
    scrape_timeout: 30s
    metrics_path: /probe
    params:
      module: [http_2xx]
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/blackbox_http.yml
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__address__]
        target_label: instance

      - source_labels: [__address__]
        target_label: target

      - source_labels: [blackbox_address]
        target_label: __address__

      - action: labeldrop
        regex: blackbox_address

  - job_name: "blackbox_icmp"
    scrape_interval: 45s
    scrape_timeout: 30s
    metrics_path: /probe
    params:
      module: [icmp_ping]
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/blackbox_icmp.yml
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__address__]
        target_label: instance

      - source_labels: [__address__]
        target_label: target

      - source_labels: [blackbox_address]
        target_label: __address__

      - action: labeldrop
        regex: blackbox_address

  - job_name: "blackbox_tcp"
    scrape_interval: 45s
    scrape_timeout: 30s
    metrics_path: /probe
    params:
      module: [tcp_connect]
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/blackbox_tcp.yml
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target

      - source_labels: [__address__]
        target_label: instance

      - source_labels: [__address__]
        target_label: target

      - source_labels: [blackbox_address]
        target_label: __address__

      - action: labeldrop
        regex: blackbox_address
